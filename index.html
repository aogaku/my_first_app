<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Noir Runner</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__copy">
          <p class="eyebrow">Neon Noir Runner</p>
          <h1>ネオンノワール・ランナー</h1>
          <p class="description">
            ネオンきらめくメガシティを駆け抜ける横スクロールアクション。ドローンを踏みつけ、ジェムを集めながら発光ゲートまで走り切ろう。
          </p>
        </div>

        <div class="hud">
          <div class="hud__item">
            <span class="hud__label">ライフ</span>
            <strong id="lives">3</strong>
          </div>
          <div class="hud__item">
            <span class="hud__label">スコア</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud__item hud__item--wide">
            <span class="hud__label">ステータス</span>
            <strong id="message">旗を目指して進もう！</strong>
          </div>
        </div>

        <div class="stage">
          <canvas
            id="game"
            width="960"
            height="540"
            aria-label="横スクロールアクションゲーム"
          ></canvas>
        </div>

        <div id="gameOverlay" class="game-overlay" hidden>
          <div class="game-overlay__panel" role="alert" aria-live="assertive">
            <div class="game-overlay__badge" aria-hidden="true">!</div>
            <p id="overlayEyebrow" class="game-overlay__eyebrow">MISSION FAILED</p>
            <h2 id="overlayTitle">ゲームオーバー</h2>
            <p id="overlayMessage" class="game-overlay__message">
              敵にやられた！ もう一度挑戦しよう。
            </p>
            <div class="game-overlay__stats" aria-label="今回のプレイ結果">
              <div class="game-overlay__stat">
                <span class="game-overlay__stat-label">SCORE</span>
                <strong id="overlayScore">0</strong>
              </div>
              <div class="game-overlay__stat">
                <span class="game-overlay__stat-label">PROGRESS</span>
                <strong id="overlayProgress">0%</strong>
              </div>
            </div>
            <p id="overlayHint" class="game-overlay__hint">
              タイミングを変えて、すぐに再挑戦しよう。
            </p>
            <button id="retryButton" type="button">リトライ</button>
          </div>
        </div>

        <div class="controls">
          <p><kbd>A</kbd> / <kbd>D</kbd> or <kbd>←</kbd> / <kbd>→</kbd> で移動</p>
          <p><kbd>W</kbd> / <kbd>Space</kbd> / <kbd>↑</kbd> でジャンプ</p>
          <button id="restartButton" type="button">リスタート</button>
        </div>
      </section>
    </main>
  </body>
</html>
